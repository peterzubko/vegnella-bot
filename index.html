<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegnella AI Asistent</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 380px; height: 500px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #df824c; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 18px; max-width: 80%; word-wrap: break-word; font-size: 0.95em; line-height: 1.4; }
        .user { background: #e8f5e9; color: #2e7d32; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; whitespace: pre-line; }
        .input-area { display: flex; border-top: 1px solid #eee; padding: 10px; background: #fff; }
        input { flex: 1; border: 1px solid #ccc; padding: 10px 14px; border-radius: 20px; outline: none; }
        button { background: #f8b02b; color: white; border: none; padding: 10px 15px; margin-left: 8px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        button:hover { background: #3cf096; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🌿 Vegnella Asistent</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">Ahoj! Som tvoj asistent z bistra Vegnella. Ako ti môžem dnes pomôcť?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Napíš správu..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">➔</button>
    </div>
</div>

<script>
    // ⚠️ SEM VLOŽ TVOJU AKTUÁLNU ADRESU Z LOCALTUNNELU (pridaj na koniec /api/chat):
    const TUNNEL_URL = "https://olive-months-remain.loca.lt/api/chat";

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';

        try {
            const response = await fetch(TUNNEL_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();
            appendMessage(data.odpoved || "Ospravedlňujem sa, nepodarilo sa získať odpoveď.", 'bot');
        } catch (error) {
            appendMessage("Chyba spojenia so serverom.", 'bot');
            console.error(error);
        }
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
